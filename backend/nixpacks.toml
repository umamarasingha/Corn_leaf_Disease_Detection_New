# Nixpacks configuration for Railway – backend deployment
# Force Node.js as the primary language, ignore Python files

[start]
# Override the detected Python deploy command
run = "node dist/app.js"

[build]
# Override build to use npm
build = "npm install && npx prisma generate && npm run build"

[nodejs]
version = "18"

[python]
# Disable Python detection - we don't want it as the deploy command
detect = false
