services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Node.js Express API Backend
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: corn-leaf-backend
    runtime: node
    region: oregon          # change to 'frankfurt' or 'singapore' as needed
    plan: free

    rootDir: backend

    buildCommand: |
      npm ci
      npx prisma generate
      npm run build

    startCommand: |
      npx prisma migrate deploy && node dist/app.js

    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000            # Render routes external traffic to 10000
      - key: JWT_SECRET
        generateValue: true     # Render generates a random secret automatically
      # After deploying the Python ML service, paste its URL here:
      - key: ML_SERVICE_URL
        value: https://corn-leaf-ml.onrender.com   # ← update this
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: corn-leaf-db
          property: connectionString

  # ─────────────────────────────────────────────────────────────────────────────
  # Python ML Inference Service
  # (uses corn_leaf_model.h5 from the repository)
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: corn-leaf-ml
    runtime: python
    region: oregon
    plan: free

    rootDir: backend

    buildCommand: pip install tensorflow-cpu pillow

    startCommand: python ml_service.py

    healthCheckPath: /health

    envVars:
      - key: PORT
        value: 10000

databases:
  # ─────────────────────────────────────────────────────────────────────────────
  # Render Managed PostgreSQL  (free tier – 1 GB storage, 90-day expiry)
  # ─────────────────────────────────────────────────────────────────────────────
  - name: corn-leaf-db
    plan: free
    region: oregon
    databaseName: cornleaf
    user: cornleaf_user
